<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0F172A">
  <meta name="color-scheme" content="dark light">
  <title>Not found — n3ary</title>
  <style>
    :root {
      --bg: #0F172A;
      --surface: #1E293B;
      --ink: #F1F5F9;
      --ink-strong: #FFFFFF;
      --ink-muted: #94A3B8;
      --line: rgba(255, 255, 255, 0.08);
      --indigo-light: #818CF8;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FFFFFF;
        --surface: #F8FAFC;
        --ink: #334155;
        --ink-strong: #0F172A;
        --ink-muted: #475569;
        --line: rgba(15, 23, 42, 0.08);
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100dvh; }
    body {
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: grid; place-items: center;
      padding: 24px;
    }
    main {
      max-width: 480px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 40px 32px;
    }
    h1 { margin: 0 0 8px; font-size: 48px; letter-spacing: -0.04em; color: var(--ink-strong); font-weight: 800; }
    p { margin: 0 0 24px; color: var(--ink-muted); }
    a {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: var(--indigo-light);
      color: #0F172A;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>That stop doesn't exist — or at least, not on this line.</p>
    <a href="/">Back to n3ary</a>
  </main>
</body>
</html>
