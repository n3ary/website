# ----------------------------------------------------------------------------
# [deploy] marketing site to Cloudflare Pages (on push to main + manual)
#
# Ships the static site to the Cloudflare Pages project 'website' on every
# push to main. The project auto-creates on the first deploy. The static
# files (index.html, 404.html, assets/, _headers) ARE the bundle; no build
# step. Custom domain n3ary.com is attached to the Pages project.
#
# Trigger:     push to main, manual
# Permissions: contents: read
# Secrets:     CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Owner:       @ciotlosm
# Run time:    ~1-2 min
# ----------------------------------------------------------------------------
name: '[deploy] marketing site to Cloudflare Pages (on push to main + manual)'

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: website-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Ensure Pages project exists
        # wrangler 4.x no longer auto-creates Pages projects on `pages deploy`,
        # and wrangler-action runs `wrangler <command>` directly (no bash), so
        # we use a `run:` step for the create so we can `|| true` cleanly. The
        # step is a no-op once the project exists.
        run: npx --yes wrangler@4 pages project create website --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # No build step -- the static files in the repo root ARE the bundle.
          # --commit-dirty=true silences wrangler's "uncommitted changes"
          # warning (wrangler-action auto-installs itself into the runner's
          # package.json, but the runner is ephemeral and the mutation
          # never touches the real repo).
          command: pages deploy . --project-name=website --branch=main --commit-dirty=true
