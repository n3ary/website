name: PR Validation

on:
  pull_request:
    branches: [main]

# Shared base PR-validation lives in n3ary/actions. enable-drift-check
# is false: this repo doesn't vendor n3ary/standards.

permissions:
  contents: read

jobs:
  shared:
    uses: n3ary/actions/.github/workflows/pr-validation.yml@v6
    with:
      enable-drift-check: false